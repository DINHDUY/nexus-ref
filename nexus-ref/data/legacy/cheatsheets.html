<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NEXUS — Developer Reference System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=IBM+Plex+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — DARK (default)
═══════════════════════════════════════════════ */
:root {
  --bg-base:       #04060f;
  --bg-panel:      #070c1a;
  --bg-sidebar:    #050810;
  --bg-hover:      rgba(0,212,255,0.05);
  --bg-active:     rgba(0,212,255,0.08);
  --bg-card:       #0a1020;
  --bg-code:       #060b16;

  --cyan:          #00d4ff;
  --cyan-dim:      rgba(0,212,255,0.6);
  --cyan-glow:     rgba(0,212,255,0.15);
  --cyan-line:     rgba(0,212,255,0.12);
  --magenta:       #ff006e;
  --mag-glow:      rgba(255,0,110,0.15);
  --green:         #00ff9f;
  --green-glow:    rgba(0,255,159,0.15);
  --amber:         #ffb700;

  --ink:           #e2eaf5;
  --ink2:          #8ba4c4;
  --ink3:          #4d6480;
  --ink4:          #2a3d56;

  --border:        rgba(0,212,255,0.1);
  --border-strong: rgba(0,212,255,0.25);
  --border-mid:    rgba(0,212,255,0.15);

  --sidebar-w:     268px;
  --topbar-h:      52px;

  --font-display:  'Orbitron', monospace;
  --font-mono:     'IBM Plex Mono', monospace;
  --font-body:     'Outfit', sans-serif;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;

  --glow-cyan: 0 0 20px rgba(0,212,255,0.3), 0 0 60px rgba(0,212,255,0.1);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
}

[data-theme="light"] {
  --bg-base:       #eef3fc;
  --bg-panel:      #f7faff;
  --bg-sidebar:    #0d1b3e;
  --bg-hover:      rgba(0,100,200,0.06);
  --bg-active:     rgba(0,100,200,0.1);
  --bg-card:       #ffffff;
  --bg-code:       #f0f5ff;

  --cyan:          #0066cc;
  --cyan-dim:      rgba(0,102,204,0.7);
  --cyan-glow:     rgba(0,102,204,0.1);
  --cyan-line:     rgba(0,102,204,0.1);
  --magenta:       #cc0055;
  --mag-glow:      rgba(204,0,85,0.1);
  --green:         #00875a;
  --green-glow:    rgba(0,135,90,0.1);
  --amber:         #b45309;

  --ink:           #0d1b3e;
  --ink2:          #2a3d56;
  --ink3:          #4d6480;
  --ink4:          #8ba4c4;

  --border:        rgba(0,102,204,0.12);
  --border-strong: rgba(0,102,204,0.3);
  --border-mid:    rgba(0,102,204,0.18);

  --glow-cyan: none;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
}

/* sidebar always dark */
[data-theme="light"] .sidebar { color: #c8d8f0; }
[data-theme="light"] .nav-search input { color: #e2eaf5; background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
[data-theme="light"] .nav-search input::placeholder { color: rgba(200,216,240,0.4); }
[data-theme="light"] .nav-search input:focus { border-color: #00d4ff; box-shadow: 0 0 0 2px rgba(0,212,255,0.2); }
[data-theme="light"] .nav-search svg { stroke: rgba(200,216,240,0.5); }
[data-theme="light"] .search-count { color: rgba(200,216,240,0.4); }
[data-theme="light"] .nav-section-label { color: rgba(200,216,240,0.35); }
[data-theme="light"] .nav-item { color: rgba(200,216,240,0.6); }
[data-theme="light"] .nav-item:hover { background: rgba(255,255,255,0.06); color: #c8d8f0; }
[data-theme="light"] .nav-item.active { color: #00d4ff; background: rgba(0,212,255,0.08); }
[data-theme="light"] .nav-item.active::before { background: #00d4ff; }
[data-theme="light"] .logo-text { color: #00d4ff; }
[data-theme="light"] .logo-sub { color: rgba(200,216,240,0.4); }
[data-theme="light"] .sidebar-footer { border-color: rgba(255,255,255,0.08); }
[data-theme="light"] .sidebar-footer-text { color: rgba(200,216,240,0.4); }
[data-theme="light"] .sidebar::after { opacity: 0.15; }

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg-base);
  color: var(--ink);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  transition: background 0.3s, color 0.3s;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink4); border-radius: 99px; }

/* scanline texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.3s;
}
[data-theme="light"] body::before { opacity: 0; }

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  height: 100dvh;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border-mid);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
  transition: background 0.3s, border-color 0.3s, left 0.3s cubic-bezier(0.4,0,0.2,1);
}
.sidebar::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.07) 1px, transparent 1px);
  background-size: 32px 32px;
  opacity: 0.4;
  pointer-events: none;
}

/* Logo */
.sidebar-logo {
  padding: 0 18px;
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(0,212,255,0.12);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.logo-mark svg { width: 30px; height: 30px; }
.logo-text {
  font-family: var(--font-display);
  font-size: 0.9rem;
  font-weight: 900;
  letter-spacing: 0.12em;
  color: #00d4ff;
  text-shadow: 0 0 20px rgba(0,212,255,0.4);
  line-height: 1;
}
.logo-sub {
  font-family: var(--font-mono);
  font-size: 0.48rem;
  letter-spacing: 0.18em;
  color: rgba(0,212,255,0.35);
  margin-top: 2px;
}

/* Nav search */
.nav-search {
  padding: 12px 12px 8px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.nav-search-inner { position: relative; }
.nav-search svg {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  width: 13px; height: 13px; stroke: var(--ink3); fill: none;
  stroke-width: 2; stroke-linecap: round; pointer-events: none;
}
.nav-search input {
  width: 100%;
  padding: 6px 8px 6px 28px;
  background: rgba(0,212,255,0.04);
  border: 1px solid rgba(0,212,255,0.15);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--ink);
  outline: none;
  letter-spacing: 0.03em;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.nav-search input::placeholder { color: var(--ink3); }
.nav-search input:focus { border-color: #00d4ff; box-shadow: 0 0 0 2px rgba(0,212,255,0.15); }
.search-count {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  color: var(--ink3);
  padding: 3px 2px 0;
  letter-spacing: 0.05em;
}

/* Nav scroll */
.nav-scroll { flex: 1; overflow-y: auto; padding: 4px 0 16px; position: relative; z-index: 1; }

.nav-section { margin-bottom: 2px; }
.nav-section-label {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink3);
  padding: 10px 16px 3px;
  display: flex; align-items: center; gap: 6px;
}
.nav-section-label::before {
  content: '';
  display: inline-block;
  width: 14px; height: 1px;
  background: var(--border-strong);
  flex-shrink: 0;
}

.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 16px;
  font-size: 0.78rem; font-weight: 400;
  color: var(--ink2);
  cursor: pointer;
  transition: background 0.12s, color 0.12s;
  position: relative;
  border: none; width: 100%; text-align: left;
  letter-spacing: 0.01em;
}
.nav-item:hover { background: var(--bg-hover); color: var(--ink); }
.nav-item.active { color: #00d4ff; background: rgba(0,212,255,0.07); }
.nav-item.active::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: #00d4ff;
  box-shadow: 0 0 8px rgba(0,212,255,0.6);
}
.nav-item-icon { width: 18px; height: 18px; flex-shrink: 0; font-size: 0.85rem; display:flex;align-items:center;justify-content:center; }
.nav-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-item-count { font-family: var(--font-mono); font-size: 0.55rem; color: var(--ink3); letter-spacing: 0.06em; flex-shrink:0; }

/* Sidebar footer */
.sidebar-footer {
  padding: 8px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  position: relative; z-index: 1;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-footer-text { font-family: var(--font-mono); font-size: 0.52rem; color: var(--ink3); letter-spacing: 0.1em; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00ff9f;
  box-shadow: 0 0 6px rgba(0,255,159,0.7);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.35} }

/* ═══════════════════════════════════════════════
   MAIN
═══════════════════════════════════════════════ */
.main {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
}

.topbar {
  height: var(--topbar-h);
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
  background: var(--bg-panel);
  transition: background 0.3s, border-color 0.3s;
}
.topbar-breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--ink3); letter-spacing: 0.08em;
}
.topbar-breadcrumb .sep { color: var(--ink4); }
.topbar-breadcrumb .current { color: var(--cyan); font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

.theme-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 12px;
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em;
  color: var(--ink3); background: transparent;
  transition: all 0.2s;
}
.theme-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }
.theme-btn svg { width: 11px; height: 11px; fill: currentColor; }

.topbar-stat {
  display: flex; align-items: center; gap: 5px;
  font-family: var(--font-mono); font-size: 0.58rem;
  color: var(--ink3); letter-spacing: 0.06em;
  padding: 3px 9px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
}
.topbar-stat .val { color: var(--cyan); font-weight: 600; }

.mob-toggle {
  display: none; width: 32px; height: 32px;
  align-items: center; justify-content: center;
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  background: var(--bg-card);
}
.mob-toggle svg { width: 15px; height: 15px; stroke: var(--ink2); fill: none; stroke-width: 2; stroke-linecap: round; }

.content-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }

/* ═══════════════════════════════════════════════
   WELCOME
═══════════════════════════════════════════════ */
.welcome {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: calc(100dvh - var(--topbar-h));
  padding: 3rem 2rem; text-align: center;
  position: relative;
}
.welcome-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 48px 48px;
  opacity: 0.5; pointer-events: none;
}
.welcome-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 50% 40% at 50% 55%, rgba(0,212,255,0.05) 0%, transparent 70%);
  pointer-events: none;
}
.welcome-hex { position: relative; width: 88px; height: 88px; margin-bottom: 2rem; }
.welcome-hex svg { width: 88px; height: 88px; }

.welcome-title {
  font-family: var(--font-display);
  font-size: clamp(1.4rem, 4vw, 2.4rem);
  font-weight: 900; letter-spacing: 0.1em;
  color: var(--ink); margin-bottom: 0.4rem; position: relative;
}
.welcome-title span { color: var(--cyan); text-shadow: var(--glow-cyan); }
.welcome-sub {
  font-family: var(--font-mono);
  font-size: 0.7rem; color: var(--ink3);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-bottom: 2.5rem;
}
.welcome-stats {
  display: flex; gap: 1px;
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-md); overflow: hidden;
  margin-bottom: 2.5rem;
}
.wstat { padding: 14px 28px; background: var(--bg-card); text-align: center; }
.wstat + .wstat { border-left: 1px solid var(--border-mid); }
.wstat-num {
  font-family: var(--font-display); font-size: 1.6rem; font-weight: 700;
  color: var(--cyan); text-shadow: var(--glow-cyan); line-height: 1;
}
.wstat-label { font-family: var(--font-mono); font-size: 0.52rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--ink3); margin-top: 4px; }
.welcome-hint {
  font-family: var(--font-mono); font-size: 0.68rem; color: var(--ink3);
  letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center;
}
.welcome-hint kbd {
  padding: 2px 7px;
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  background: var(--bg-card); color: var(--cyan);
  font-family: var(--font-mono); font-size: 0.62rem;
}

/* ═══════════════════════════════════════════════
   SHEET VIEW
═══════════════════════════════════════════════ */
#sheet-view { display: none; }
#sheet-view.visible { display: block; }

.sheet-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-panel);
  display: flex; align-items: flex-start; gap: 18px;
  position: relative; overflow: hidden;
}
.sheet-header::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--cyan), transparent 55%);
  opacity: 0.35;
}
.sheet-header::before {
  content: ''; position: absolute; top: 0; right: 0;
  width: 240px; height: 100%;
  background: radial-gradient(ellipse at right top, rgba(0,212,255,0.06), transparent 65%);
  pointer-events: none;
}
.sheet-icon {
  width: 56px; height: 56px; border-radius: var(--radius-md);
  display: grid; place-items: center; font-size: 1.7rem;
  flex-shrink: 0; border: 1px solid var(--border-mid); background: var(--bg-card);
  position: relative; z-index: 1;
}
.sheet-meta { flex: 1; min-width: 0; position: relative; z-index: 1; }
.sheet-title {
  font-family: var(--font-display); font-size: 1.25rem; font-weight: 700;
  letter-spacing: 0.07em; color: var(--ink); margin-bottom: 4px;
}
.sheet-desc { font-size: 0.8rem; color: var(--ink2); font-weight: 300; line-height: 1.6; max-width: 580px; margin-bottom: 10px; }
.sheet-badges { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
.badge {
  font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em;
  padding: 2px 9px; border-radius: 2px; border: 1px solid; text-transform: uppercase;
}
.badge-cat { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }
.badge-tag { border-color: var(--border-mid); color: var(--ink3); }

.sheet-actions { display: flex; gap: 7px; position: relative; z-index: 1; }
.action-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 13px;
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em;
  color: var(--ink3); background: var(--bg-card);
  transition: all 0.18s; white-space: nowrap;
}
.action-btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-glow); }
.action-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }

/* Sheet body */
.sheet-body { padding: 24px 28px 48px; }
.sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 16px; }

/* Section block */
.sec-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md); overflow: hidden;
  transition: border-color 0.2s;
  animation: sec-in 0.3s ease both;
}
.sec-block:hover { border-color: var(--border-mid); }
@keyframes sec-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.sec-block-header {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 13px;
  background: rgba(0,212,255,0.03);
  border-bottom: 1px solid var(--border);
  position: relative;
}
.sec-block-header::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0; width: 2px;
  background: var(--sec-accent, var(--cyan));
  opacity: 0.7;
}
.sec-block-title {
  font-family: var(--font-display); font-size: 0.58rem; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--sec-accent, var(--cyan));
}
.sec-block-count {
  margin-left: auto; font-family: var(--font-mono);
  font-size: 0.52rem; color: var(--ink3); letter-spacing: 0.1em;
}

/* Command rows */
.cmd-row {
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
  position: relative; transition: background 0.12s;
}
.cmd-row:last-child { border-bottom: none; }
.cmd-row:hover { background: var(--bg-hover); }

.cmd-key {
  font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500;
  color: var(--green); padding: 6px 12px;
  white-space: nowrap; letter-spacing: 0.01em;
  min-width: 150px; max-width: 185px;
  overflow: hidden; text-overflow: ellipsis;
  border-right: 1px solid var(--border);
  display: flex; align-items: center;
}
.cmd-val {
  font-size: 0.73rem; color: var(--ink2);
  padding: 6px 8px 6px 11px; font-weight: 300;
  line-height: 1.4; display: flex; align-items: center;
}
.cmd-copy {
  width: 30px; display: grid; place-items: center;
  opacity: 0; margin: 3px; border: 1px solid transparent;
  border-radius: var(--radius-sm); transition: all 0.12s;
  flex-shrink: 0; align-self: center;
}
.cmd-row:hover .cmd-copy { opacity: 1; }
.cmd-copy:hover { background: var(--cyan-glow); border-color: var(--border-mid); }
.cmd-copy svg { width: 10px; height: 10px; stroke: var(--ink3); fill: none; stroke-width: 2; stroke-linecap: round; }
.cmd-copy:hover svg { stroke: var(--cyan); }

/* ═══════════════════════════════════════════════
   MOBILE
═══════════════════════════════════════════════ */
.mob-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.65); z-index: 500;
  backdrop-filter: blur(3px);
}
@media(max-width: 768px) {
  .sidebar {
    position: fixed; left: -100%; top: 0; height: 100dvh;
    z-index: 600; width: min(var(--sidebar-w), 88vw);
  }
  .sidebar.open { left: 0; }
  .mob-toggle { display: flex; }
  .mob-overlay.show { display: block; }
  .sections-grid { grid-template-columns: 1fr; }
  .sheet-header { flex-wrap: wrap; padding: 16px; }
  .sheet-body { padding: 16px 14px 48px; }

// ─── helpers ──────────────────────────────────
function totalCmds(sheet) {
  return sheet.sections.reduce((a,s)=>a+s.items.length,0);
}
function allCmds() {
  return SHEETS.reduce((a,s)=>a+totalCmds(s),0);
}
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── state ────────────────────────────────────
let activeId = null;
let searchQuery = '';

// ─── nav build ────────────────────────────────
const navScroll = document.getElementById('navScroll');

function buildNav() {
  navScroll.innerHTML = '';
  const q = searchQuery.toLowerCase();
  const cats = [...new Set(SHEETS.map(s=>s.category))];
  cats.forEach(cat => {
    const sheets = SHEETS.filter(s => {
      if (s.category !== cat) return false;
      if (!q) return true;
      return s.title.toLowerCase().includes(q) ||
             s.tags.some(t=>t.includes(q)) ||
             s.category.toLowerCase().includes(q);
    });
    if (!sheets.length) return;
    const sec = document.createElement('div');
    sec.className = 'nav-section';
    const lbl = document.createElement('div');
    lbl.className = 'nav-section-label';
    lbl.textContent = cat;
    sec.appendChild(lbl);
    sheets.forEach(sheet => {
      const btn = document.createElement('button');
      btn.className = 'nav-item' + (sheet.id===activeId?' active':'');
      btn.dataset.id = sheet.id;
      btn.innerHTML = `
        <span class="nav-item-icon">${sheet.icon}</span>
        <span class="nav-item-name">${sheet.title}</span>
        <span class="nav-item-count">${totalCmds(sheet)}</span>
      `;
      btn.addEventListener('click', ()=>selectSheet(sheet.id));
      sec.appendChild(btn);
    });
    navScroll.appendChild(sec);
  });
}

function updateCount() {
  const q = searchQuery.toLowerCase();
  const n = q ? SHEETS.filter(s=>s.title.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q))||s.category.toLowerCase().includes(q)).length : SHEETS.length;
  document.getElementById('searchCount').textContent = `${n} / ${SHEETS.length} sheets`;
}

// ─── select sheet ─────────────────────────────
function selectSheet(id) {
  activeId = id;
  const sheet = SHEETS.find(s=>s.id===id);
  if (!sheet) return;

  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  document.getElementById('topbarCurrent').textContent = sheet.title.toUpperCase();
  document.getElementById('statCmds').textContent = totalCmds(sheet);

  document.getElementById('welcomeScreen').style.display = 'none';
  const sv = document.getElementById('sheet-view');
  sv.classList.add('visible');

  document.getElementById('sheetIcon').textContent = sheet.icon;
  document.getElementById('sheetTitle').textContent = sheet.title;
  document.getElementById('sheetDesc').textContent = sheet.desc;

  document.getElementById('sheetBadges').innerHTML =
    `<span class="badge badge-cat">${sheet.category}</span>` +
    sheet.tags.map(t=>`<span class="badge badge-tag">${t}</span>`).join('');

  const grid = document.getElementById('sectionsGrid');
  grid.innerHTML = '';

  sheet.sections.forEach((sec,si) => {
    const block = document.createElement('div');
    block.className = 'sec-block';
    block.style.animationDelay = `${si*0.055}s`;
    block.style.setProperty('--sec-accent', sheet.accent);

    block.innerHTML = `
      <div class="sec-block-header">
        <span class="sec-block-title">${escHtml(sec.title)}</span>
        <span class="sec-block-count">${sec.items.length} cmds</span>
      </div>
      ${sec.items.map(([key,val])=>`
        <div class="cmd-row">
          <span class="cmd-key">${escHtml(key)}</span>
          <span class="cmd-val">${escHtml(val)}</span>
          <button class="cmd-copy" data-copy="${key.replace(/"/g,'&quot;')}" title="Copy">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      `).join('')}
    `;
    grid.appendChild(block);
  });

  grid.querySelectorAll('.cmd-copy').forEach(btn => {
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        const orig = btn.innerHTML;
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`;
        setTimeout(()=>{ btn.innerHTML=orig; }, 1400);
      });
    });
  });

  document.getElementById('contentScroll').scrollTop = 0;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
}

// copy all
document.getElementById('copyAllBtn').addEventListener('click', () => {
  if (!activeId) return;
  const sheet = SHEETS.find(s=>s.id===activeId);
  const text = sheet.sections.map(sec =>
    `# ${sec.title}\n` + sec.items.map(([k,v])=>`${k.padEnd(45)} # ${v}`).join('\n')
  ).join('\n\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyAllBtn');
    const orig = btn.innerHTML;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> COPIED!`;
    btn.style.borderColor='var(--cyan)'; btn.style.color='var(--cyan)';
    setTimeout(()=>{ btn.innerHTML=orig; btn.style.borderColor=''; btn.style.color=''; }, 2000);
  });
});

// search
document.getElementById('navSearch').addEventListener('input', e=>{
  searchQuery = e.target.value;
  buildNav();
  updateCount();
});

// theme
const savedTheme = localStorage.getItem('nexus-theme')||'dark';
document.documentElement.dataset.theme = savedTheme;
applyTheme(savedTheme);

document.getElementById('themeBtn').addEventListener('click', ()=>{
  const next = document.documentElement.dataset.theme==='dark'?'light':'dark';
  document.documentElement.dataset.theme=next;
  localStorage.setItem('nexus-theme',next);
  applyTheme(next);
});

function applyTheme(t) {
  document.getElementById('themeIconSun').style.display  = t==='dark'?'block':'none';
  document.getElementById('themeIconMoon').style.display = t==='dark'?'none':'block';
  document.getElementById('themeLabel').textContent = t==='dark'?'LIGHT':'DARK';
}

// keyboard
document.addEventListener('keydown', e=>{
  const inp = document.getElementById('navSearch');
  if (e.key==='/' && document.activeElement!==inp) { e.preventDefault(); inp.focus(); }
  if (e.key==='Escape') { inp.blur(); document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobOverlay').classList.remove('show'); }
});

// mobile
document.getElementById('mobToggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobOverlay').classList.toggle('show');
});
document.getElementById('mobOverlay').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobOverlay').classList.remove('show');
});

// init
document.getElementById('wTotalCmds').textContent = allCmds();
buildNav();
updateCount();
selectSheet(SHEETS[0].id);
</script>
